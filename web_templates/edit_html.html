{% extends "layout.html" %}
{% block title %}Edit Slides - {{ project.name }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <a href="/" class="breadcrumb">Projects</a> /
    <a href="/projects/{{ project.id }}" class="breadcrumb">{{ project.name }}</a> /
    <span>Edit Slides</span>
    <h1>Edit Slides</h1>
  </div>
</div>

<div class="slide-selector">
  {% for s in slides %}
  <button class="slide-tab {% if loop.first %}active{% endif %}"
          data-idx="{{ s.index }}" onclick="selectSlide({{ s.index }}, this)">
    <img src="/api/projects/{{ project.id }}/assets/slides/{{ s.index }}" alt="Slide {{ s.index + 1 }}" loading="lazy">
    <span>{{ s.index + 1 }}</span>
  </button>
  {% endfor %}
</div>

<div class="editor-split">
  <div class="editor-pane">
    <div class="pane-header">
      <h3>Slide Content</h3>
      <span class="slide-type-badge" id="slide-type-badge"></span>
    </div>
    <div class="structured-editor" id="structured-editor">
      <div class="se-loading">Loading plan&hellip;</div>
    </div>
    <div class="se-actions">
      <button class="btn btn-primary" onclick="saveAndPreview()">Save and Preview</button>
    </div>
  </div>
  <div class="editor-pane">
    <h3>Preview</h3>
    <div class="preview-frame-wrapper">
      <iframe id="html-preview" sandbox="allow-same-origin"></iframe>
    </div>
  </div>
</div>

<div id="editor-status" class="editor-status"></div>
{% endblock %}

{% block scripts %}
<script>
const PROJECT_ID = '{{ project.id }}';
let currentIdx = {{ slides[0].index if slides else 0 }};
let plan = null;

function showStatus(msg, isError) {
  const el = document.getElementById('editor-status');
  el.textContent = msg;
  el.className = 'editor-status ' + (isError ? 'error' : 'success');
  setTimeout(() => el.textContent = '', 4000);
}

function scalePreview() {
  const wrapper = document.querySelector('.preview-frame-wrapper');
  const iframe = document.getElementById('html-preview');
  if (wrapper && iframe) {
    iframe.style.transform = `scale(${wrapper.clientWidth / 1920})`;
  }
}
window.addEventListener('resize', scalePreview);

function setPreviewHtml(html) {
  const iframe = document.getElementById('html-preview');
  const doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  scalePreview();
}

// ---- Collect current form values into the plan object --------------------

function collectTitleFields() {
  return {
    lesson_title: document.getElementById('se-lesson-title')?.value ?? '',
    story_summary: document.getElementById('se-story-summary')?.value ?? '',
  };
}

function collectSlideFields() {
  const slideIdx = currentIdx - 1;
  const spec = plan.slides[slideIdx];
  const fields = {
    title: document.getElementById('se-title')?.value ?? spec.title,
    bullets: [...document.querySelectorAll('.se-bullet-input')].map(el => el.value),
  };

  if (spec.vocab_items) {
    fields.vocab_items = [...document.querySelectorAll('.se-vocab-row')].map(row => ({
      word: row.querySelector('.se-vocab-word')?.value ?? '',
      pos: row.querySelector('.se-vocab-pos')?.value ?? '',
      definition: row.querySelector('.se-vocab-def')?.value ?? '',
      example: row.querySelector('.se-vocab-ex')?.value ?? '',
    }));
  }

  if (spec.scene_dialogue) {
    fields.scene_dialogue = [...document.querySelectorAll('.se-dialogue-row')].map(row => ({
      speaker: row.querySelector('.se-dialogue-speaker')?.value ?? '',
      line: row.querySelector('.se-dialogue-line')?.value ?? '',
    }));
  }

  if (spec.teacher_notes !== undefined && spec.teacher_notes !== null) {
    fields.teacher_notes = document.getElementById('se-teacher-notes')?.value ?? '';
  }

  return fields;
}

function applyFieldsToPlan() {
  if (currentIdx === 0) {
    const f = collectTitleFields();
    plan.lesson_title = f.lesson_title;
    plan.story_summary = f.story_summary;
  } else {
    const f = collectSlideFields();
    const spec = plan.slides[currentIdx - 1];
    spec.title = f.title;
    spec.bullets = f.bullets;
    if (f.vocab_items) spec.vocab_items = f.vocab_items;
    if (f.scene_dialogue) spec.scene_dialogue = f.scene_dialogue;
    if (f.teacher_notes !== undefined) spec.teacher_notes = f.teacher_notes;
  }
}

// ---- Build the structured editor form ------------------------------------

function buildTitleEditor() {
  return `
    <div class="se-field-group">
      <label for="se-lesson-title">Lesson Title</label>
      <input type="text" id="se-lesson-title" class="se-input"
             value="${escAttr(plan.lesson_title)}">
    </div>
    <div class="se-field-group">
      <label for="se-story-summary">Story Summary</label>
      <textarea id="se-story-summary" class="se-textarea" rows="4">${escHtml(plan.story_summary)}</textarea>
    </div>`;
}

function buildBulletsList(bullets) {
  let html = '<div class="se-field-group"><label>Bullets</label><div id="se-bullets-list">';
  (bullets || []).forEach((b, i) => {
    html += `<div class="se-bullet-item">
      <input type="text" class="se-bullet-input se-input" value="${escAttr(b)}">
      <button type="button" class="btn btn-sm btn-danger se-remove-btn" onclick="removeBullet(${i})">&times;</button>
    </div>`;
  });
  html += '</div><button type="button" class="btn btn-sm" onclick="addBullet()">+ Add Bullet</button></div>';
  return html;
}

function buildVocabEditor(items) {
  let html = '<div class="se-field-group"><label>Vocabulary Items</label><div id="se-vocab-list">';
  (items || []).forEach((v, i) => {
    html += `<div class="se-vocab-row">
      <input type="text" class="se-vocab-word se-input se-input-sm" placeholder="Word" value="${escAttr(v.word)}">
      <input type="text" class="se-vocab-pos se-input se-input-sm" placeholder="POS" value="${escAttr(v.pos || '')}">
      <input type="text" class="se-vocab-def se-input se-input-sm" placeholder="Definition" value="${escAttr(v.definition || '')}">
      <input type="text" class="se-vocab-ex se-input se-input-sm" placeholder="Example" value="${escAttr(v.example || '')}">
      <button type="button" class="btn btn-sm btn-danger se-remove-btn" onclick="removeVocab(${i})">&times;</button>
    </div>`;
  });
  html += '</div><button type="button" class="btn btn-sm" onclick="addVocab()">+ Add Word</button></div>';
  return html;
}

function buildDialogueEditor(lines) {
  let html = '<div class="se-field-group"><label>Scene Dialogue</label><div id="se-dialogue-list">';
  (lines || []).forEach((d, i) => {
    html += `<div class="se-dialogue-row">
      <input type="text" class="se-dialogue-speaker se-input se-input-sm" placeholder="Speaker" value="${escAttr(d.speaker || '')}">
      <input type="text" class="se-dialogue-line se-input" placeholder="Line" value="${escAttr(d.line || '')}">
      <button type="button" class="btn btn-sm btn-danger se-remove-btn" onclick="removeDialogue(${i})">&times;</button>
    </div>`;
  });
  html += '</div><button type="button" class="btn btn-sm" onclick="addDialogue()">+ Add Line</button></div>';
  return html;
}

function renderEditor() {
  const container = document.getElementById('structured-editor');
  const badge = document.getElementById('slide-type-badge');
  let html = '';

  if (currentIdx === 0) {
    badge.textContent = 'Title Slide';
    html = buildTitleEditor();
  } else {
    const spec = plan.slides[currentIdx - 1];
    if (!spec) { container.innerHTML = '<div class="se-loading">Slide not found in plan</div>'; return; }
    badge.textContent = spec.slide_type.replace(/_/g, ' ');

    html += `<div class="se-field-group">
      <label for="se-title">Title</label>
      <input type="text" id="se-title" class="se-input"
             value="${escAttr(spec.title)}">
    </div>`;

    html += buildBulletsList(spec.bullets);

    if (spec.vocab_items) html += buildVocabEditor(spec.vocab_items);
    if (spec.scene_dialogue) html += buildDialogueEditor(spec.scene_dialogue);

    if (spec.teacher_notes !== undefined && spec.teacher_notes !== null) {
      html += `<div class="se-field-group">
        <label for="se-teacher-notes">Teacher Notes</label>
        <textarea id="se-teacher-notes" class="se-textarea" rows="2">${escHtml(spec.teacher_notes || '')}</textarea>
      </div>`;
    }
  }

  container.innerHTML = html;
}

// ---- Add / remove helpers ------------------------------------------------

function addBullet() {
  applyFieldsToPlan();
  const spec = plan.slides[currentIdx - 1];
  spec.bullets.push('');
  renderEditor();
  const inputs = document.querySelectorAll('.se-bullet-input');
  inputs[inputs.length - 1]?.focus();
}

function removeBullet(i) {
  applyFieldsToPlan();
  plan.slides[currentIdx - 1].bullets.splice(i, 1);
  renderEditor();
}

function addVocab() {
  applyFieldsToPlan();
  const spec = plan.slides[currentIdx - 1];
  if (!spec.vocab_items) spec.vocab_items = [];
  spec.vocab_items.push({ word: '', pos: '', definition: '', example: '' });
  renderEditor();
}

function removeVocab(i) {
  applyFieldsToPlan();
  plan.slides[currentIdx - 1].vocab_items.splice(i, 1);
  renderEditor();
}

function addDialogue() {
  applyFieldsToPlan();
  const spec = plan.slides[currentIdx - 1];
  if (!spec.scene_dialogue) spec.scene_dialogue = [];
  spec.scene_dialogue.push({ speaker: '', line: '' });
  renderEditor();
}

function removeDialogue(i) {
  applyFieldsToPlan();
  plan.slides[currentIdx - 1].scene_dialogue.splice(i, 1);
  renderEditor();
}

// ---- Escape helpers ------------------------------------------------------

function escAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escHtml(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ---- Slide selection & save ----------------------------------------------

function selectSlide(idx, btn) {
  applyFieldsToPlan();
  document.querySelectorAll('.slide-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentIdx = idx;
  renderEditor();

  const htmlResp = fetch(`/api/projects/${PROJECT_ID}/assets/slides/${idx}/html`)
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (data) setPreviewHtml(data.html); });
}

async function saveAndPreview() {
  applyFieldsToPlan();

  const saveResp = await fetch(`/api/projects/${PROJECT_ID}/assets/plan`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(plan),
  });
  if (!saveResp.ok) {
    showStatus('Save failed', true);
    return;
  }

  const body = currentIdx === 0 ? collectTitleFields() : collectSlideFields();
  const previewResp = await fetch(`/api/projects/${PROJECT_ID}/preview-slide/${currentIdx}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (previewResp.ok) {
    const data = await previewResp.json();
    setPreviewHtml(data.html);
    showStatus('Saved and preview updated.');
  } else {
    showStatus('Saved, but preview failed.', true);
  }
}

// ---- Init ----------------------------------------------------------------

async function init() {
  const resp = await fetch(`/api/projects/${PROJECT_ID}/assets/plan`);
  if (!resp.ok) {
    document.getElementById('structured-editor').innerHTML =
      '<div class="se-loading">Could not load slide plan.</div>';
    return;
  }
  plan = await resp.json();
  renderEditor();

  const htmlResp = await fetch(`/api/projects/${PROJECT_ID}/assets/slides/${currentIdx}/html`);
  if (htmlResp.ok) {
    const data = await htmlResp.json();
    setPreviewHtml(data.html);
  }
}

init();
</script>
{% endblock %}
