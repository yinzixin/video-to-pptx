version: "3.9"

services:
  whisper:
    build: .
    container_name: whisper_cpu

    volumes:
      - .:/app
      - hf-cache:/root/.cache/huggingface

    working_dir: /app

    ports:
      - "8000:8000"

    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MIMO_API_KEY=${MIMO_API_KEY:-}

    # Web UI (default); CLI still available via docker compose run
    command: python -m uvicorn app:app --host 0.0.0.0 --port 8000

    # CLI example:
    # docker compose run --rm whisper python cartoon_to_slides.py --input input/1.mp4 --output output

volumes:
  hf-cache: