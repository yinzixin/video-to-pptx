<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif;
  color: #fff;
  position: relative;
  background:
    repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(255,255,255,0.007) 3px, rgba(255,255,255,0.007) 6px
    ),
    repeating-linear-gradient(
      90deg, transparent, transparent 4px,
      rgba(255,255,255,0.005) 4px, rgba(255,255,255,0.005) 8px
    ),
    radial-gradient(ellipse at 25% 15%, rgba(255,255,255,0.05) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 80%, rgba(255,255,255,0.04) 0%, transparent 50%),
    linear-gradient(160deg, #1a3d2b 0%, #275a3b 25%, #1e4632 50%, #234e38 75%, #1a3d2b 100%);
}

body::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 14px solid;
  border-image: linear-gradient(145deg, #8B6914, #6B4830, #5A3825, #7B5838, #8B6914) 1;
  pointer-events: none;
  z-index: 1000;
}

body::before {
  content: '';
  position: absolute;
  inset: 14px;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.25);
  pointer-events: none;
  z-index: 999;
}

.slide-container {
  position: relative;
  width: 100%;
  height: 100%;
  padding: 40px 60px;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

.slide-header-bar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 3px solid rgba(244, 197, 66, 0.3);
  flex-shrink: 0;
}

.slide-title {
  font-family: 'Fredoka', 'Comic Sans MS', cursive;
  color: #F4C542;
  font-size: 50px;
  font-weight: 700;
  text-shadow: 2px 3px 6px rgba(0,0,0,0.35);
  line-height: 1.2;
}

.section-tag {
  font-family: 'Quicksand', sans-serif;
  color: rgba(255,255,255,0.45);
  font-size: 20px;
  font-weight: 500;
  font-style: italic;
  white-space: nowrap;
}

.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 24px 30px;
}

.card-accent {
  border-left: 5px solid #F4C542;
}

.frame-photo {
  border: 8px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  box-shadow: 6px 6px 20px rgba(0,0,0,0.4);
  object-fit: cover;
}

.frame-rotated {
  transform: rotate(-2deg);
}

.body-text {
  font-size: 28px;
  line-height: 1.6;
  font-weight: 500;
}

.bullet-item {
  font-size: 26px;
  line-height: 1.5;
  font-weight: 500;
  padding: 6px 0;
}

.bullet-dot::before {
  content: '✦ ';
  color: #F4C542;
  font-size: 20px;
}

.highlight { color: #E88D67; font-weight: 700; }
.gold { color: #F4C542; }

.teacher-note {
  position: absolute;
  bottom: 28px;
  left: 60px;
  right: 60px;
  font-size: 19px;
  font-style: italic;
  color: rgba(255,255,255,0.4);
  z-index: 2;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.speech-bubble {
  position: relative;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 16px 24px;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.15);
}

.speaker-name {
  font-weight: 700;
  color: #F4C542;
  font-size: 22px;
  margin-bottom: 4px;
}

.speaker-line {
  font-size: 24px;
  font-weight: 500;
  line-height: 1.4;
}

.vocab-card {
  display: flex;
  gap: 20px;
  align-items: center;
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px 20px;
  border: 1px solid rgba(255,255,255,0.1);
}

.vocab-illustration {
  width: 100px;
  height: 100px;
  border-radius: 12px;
  object-fit: cover;
  flex-shrink: 0;
}

.vocab-word {
  font-family: 'Fredoka', cursive;
  font-size: 26px;
  font-weight: 700;
  color: #F4C542;
}

.vocab-pos {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  font-style: italic;
  margin-left: 8px;
}

.vocab-definition {
  font-size: 22px;
  font-weight: 500;
  margin-top: 4px;
}

.vocab-example {
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  font-style: italic;
  margin-top: 2px;
}

.qa-question {
  font-size: 26px;
  font-weight: 700;
  color: #F4C542;
  padding: 8px 0 2px;
}

.qa-answer {
  font-size: 24px;
  color: rgba(255,255,255,0.7);
  font-style: italic;
  padding: 2px 0 12px;
}

.flow-step {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 8px 0;
}

.flow-number {
  width: 44px;
  height: 44px;
  background: #F4C542;
  color: #1a3d2b;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka', cursive;
  font-size: 24px;
  font-weight: 700;
  flex-shrink: 0;
}

.flow-text {
  font-size: 26px;
  font-weight: 500;
}

.flow-arrow {
  text-align: center;
  color: rgba(255,255,255,0.3);
  font-size: 22px;
  margin: 2px 0 2px 20px;
}

.moral-quote {
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  color: #F4C542;
  line-height: 1.4;
  padding: 20px 40px;
}

.moral-marks {
  font-size: 72px;
  color: rgba(244, 197, 66, 0.3);
  font-family: Georgia, serif;
  line-height: 0.5;
}

.discussion-item {
  background: rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 18px 28px;
  margin: 14px 0;
  font-size: 26px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
}

.discussion-item:nth-child(even) {
  margin-left: 60px;
  background: rgba(244, 197, 66, 0.08);
  border-color: rgba(244, 197, 66, 0.15);
}

.phrase-box {
  display: inline-block;
  background: rgba(232, 141, 103, 0.15);
  border: 1px solid rgba(232, 141, 103, 0.3);
  border-radius: 12px;
  padding: 12px 24px;
  margin: 8px 6px;
  font-size: 26px;
  font-weight: 600;
  color: #fff;
}

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<div class="slide-container">
  {% block header %}
  <div class="slide-header-bar">
    <h1 class="slide-title">{{ title }}</h1>
    <span class="section-tag">{{ section_tag }}</span>
  </div>
  {% endblock %}

  <div class="content">
    {% block content %}{% endblock %}
  </div>

  {% if teacher_notes %}
  <div class="teacher-note">💡 {{ teacher_notes }}</div>
  {% endif %}
</div>
</body>
</html>
