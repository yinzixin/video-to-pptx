<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif;
  color: #3a3a5c;
  position: relative;
  background:
    radial-gradient(circle at 10% 15%, rgba(255,200,60,0.25) 0%, transparent 40%),
    radial-gradient(circle at 85% 20%, rgba(120,220,255,0.25) 0%, transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(255,140,200,0.2) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(140,255,170,0.18) 0%, transparent 35%),
    linear-gradient(145deg, #e8f4fd 0%, #fef6e4 30%, #fce4ec 60%, #e8f5e9 85%, #e8f4fd 100%);
}

body::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 12px solid;
  border-image: linear-gradient(135deg, #FFD93D, #FF6B6B, #6BCB77, #4D96FF, #FFD93D) 1;
  pointer-events: none;
  z-index: 1000;
}

body::before {
  content: '⭐';
  position: absolute;
  top: 22px;
  right: 28px;
  font-size: 42px;
  pointer-events: none;
  z-index: 1001;
  filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
}

.slide-container {
  position: relative;
  width: 100%;
  height: 100%;
  padding: 40px 56px;
  z-index: 1;
  display: flex;
  flex-direction: column;
}

.slide-header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 4px dashed rgba(255,107,107,0.35);
  flex-shrink: 0;
}

.slide-title {
  font-family: 'Fredoka', 'Comic Sans MS', cursive;
  color: #FF6B6B;
  font-size: 66px;
  font-weight: 700;
  text-shadow: 2px 3px 0px rgba(0,0,0,0.08);
  line-height: 1.15;
}

.section-tag {
  font-family: 'Fredoka', cursive;
  color: #4D96FF;
  font-size: 32px;
  font-weight: 600;
  white-space: nowrap;
  background: rgba(77,150,255,0.1);
  padding: 8px 20px;
  border-radius: 22px;
  border: 2px solid rgba(77,150,255,0.2);
}

.content {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.card {
  background: rgba(255,255,255,0.75);
  border: 3px solid rgba(77,150,255,0.2);
  border-radius: 24px;
  padding: 24px 30px;
  box-shadow: 4px 4px 0px rgba(0,0,0,0.04);
}

.card-accent {
  border-left: 6px solid #FFD93D;
}

.frame-photo {
  border: 6px solid #fff;
  border-radius: 18px;
  box-shadow: 4px 6px 18px rgba(0,0,0,0.15);
  object-fit: cover;
}

.frame-rotated {
  transform: rotate(-2deg);
}

.body-text {
  font-size: 38px;
  line-height: 1.55;
  font-weight: 600;
}

.bullet-item {
  font-size: 36px;
  line-height: 1.5;
  font-weight: 600;
  padding: 8px 0;
}

.bullet-dot::before {
  content: '★ ';
  color: #FFD93D;
  font-size: 28px;
}

.highlight { color: #FF6B6B; font-weight: 700; }
.gold { color: #FFD93D; }

.teacher-note {
  flex-shrink: 0;
  font-size: 20px;
  font-style: italic;
  color: rgba(58,58,92,0.4);
  z-index: 2;
  padding-top: 8px;
  margin-top: 6px;
  border-top: 2px dotted rgba(58,58,92,0.12);
  line-height: 1.3;
}

.speech-bubble {
  position: relative;
  background: rgba(255,255,255,0.85);
  border-radius: 26px;
  padding: 16px 26px;
  margin: 6px 0;
  border: 3px solid rgba(77,150,255,0.2);
  box-shadow: 3px 3px 0px rgba(0,0,0,0.04);
}

.speaker-name {
  font-family: 'Fredoka', cursive;
  font-weight: 700;
  color: #FF6B6B;
  font-size: 30px;
  margin-bottom: 2px;
}

.speaker-line {
  font-size: 34px;
  font-weight: 600;
  line-height: 1.4;
}

.vocab-card {
  display: flex;
  gap: 18px;
  align-items: center;
  background: rgba(255,255,255,0.8);
  border-radius: 22px;
  padding: 18px 22px;
  border: 3px solid rgba(77,150,255,0.15);
  box-shadow: 3px 3px 0px rgba(0,0,0,0.04);
}

.vocab-illustration {
  width: 130px;
  height: 130px;
  border-radius: 18px;
  object-fit: cover;
  flex-shrink: 0;
  border: 3px solid #fff;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
}

.vocab-word {
  font-family: 'Fredoka', cursive;
  font-size: 38px;
  font-weight: 700;
  color: #4D96FF;
}

.vocab-pos {
  font-size: 24px;
  color: rgba(58,58,92,0.5);
  font-style: italic;
  margin-left: 8px;
}

.vocab-definition {
  font-size: 32px;
  font-weight: 600;
  margin-top: 4px;
}

.vocab-example {
  font-size: 24px;
  color: rgba(58,58,92,0.5);
  font-style: italic;
  margin-top: 2px;
}

.qa-question {
  font-size: 36px;
  font-weight: 700;
  color: #FF6B6B;
  padding: 6px 0 2px;
}

.qa-answer {
  font-size: 32px;
  color: rgba(58,58,92,0.55);
  font-style: italic;
  padding: 2px 0 10px;
}

.flow-step {
  display: flex;
  align-items: center;
  gap: 22px;
  margin: 12px 0;
}

.flow-number {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, #FFD93D, #FF9A3D);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka', cursive;
  font-size: 36px;
  font-weight: 700;
  flex-shrink: 0;
  box-shadow: 3px 3px 0px rgba(0,0,0,0.08);
}

.flow-text {
  font-size: 38px;
  font-weight: 600;
}

.flow-arrow {
  text-align: center;
  color: rgba(77,150,255,0.4);
  font-size: 30px;
  margin: 2px 0 2px 30px;
}

.moral-quote {
  text-align: center;
  font-size: 50px;
  font-weight: 700;
  color: #FF6B6B;
  line-height: 1.4;
  padding: 24px 40px;
}

.moral-marks {
  font-size: 90px;
  color: rgba(255,107,107,0.2);
  font-family: Georgia, serif;
  line-height: 0.5;
}

.discussion-item {
  background: rgba(255,255,255,0.8);
  border-radius: 26px;
  padding: 20px 30px;
  margin: 12px 0;
  font-size: 36px;
  font-weight: 600;
  border: 3px solid rgba(77,150,255,0.15);
  box-shadow: 3px 3px 0px rgba(0,0,0,0.04);
}

.discussion-item:nth-child(even) {
  margin-left: 60px;
  background: rgba(255,217,61,0.12);
  border-color: rgba(255,217,61,0.3);
}

.phrase-box {
  display: inline-block;
  background: rgba(255,255,255,0.8);
  border: 3px solid rgba(107,203,119,0.3);
  border-radius: 22px;
  padding: 18px 34px;
  margin: 10px 8px;
  font-size: 36px;
  font-weight: 700;
  color: #3a3a5c;
  box-shadow: 3px 3px 0px rgba(0,0,0,0.04);
}

/* ── Decorative cartoon photo treatments ── */

.polaroid {
  background: #fff;
  padding: 10px 10px 44px;
  border-radius: 14px;
  box-shadow: 4px 6px 18px rgba(0,0,0,0.12);
  position: relative;
  transform: rotate(-1deg);
}
.polaroid img {
  width: 100%;
  display: block;
  border-radius: 8px;
}
.polaroid-caption {
  position: absolute;
  bottom: 8px;
  left: 14px;
  right: 14px;
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: #3a3a5c;
  font-family: 'Fredoka', cursive;
}

.taped-photo {
  position: relative;
  display: inline-block;
}
.taped-photo::before,
.taped-photo::after {
  content: '';
  position: absolute;
  width: 70px;
  height: 24px;
  background: rgba(255,217,61,0.6);
  z-index: 5;
  border-radius: 4px;
  box-shadow: 1px 1px 4px rgba(0,0,0,0.1);
}
.taped-photo::before {
  top: -6px;
  left: 16px;
  transform: rotate(-12deg);
}
.taped-photo::after {
  bottom: -6px;
  right: 16px;
  transform: rotate(6deg);
}

.pinned-photo {
  position: relative;
  display: inline-block;
}
.pinned-photo::before {
  content: '📌';
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 36px;
  z-index: 5;
  filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.2));
}

.filmstrip {
  display: flex;
  gap: 14px;
  padding: 18px 24px;
  background: rgba(255,255,255,0.5);
  border-radius: 18px;
  border: 3px solid rgba(77,150,255,0.15);
  overflow: hidden;
}
.filmstrip-frame {
  flex: 1;
  border: 3px solid rgba(77,150,255,0.2);
  border-radius: 12px;
  overflow: hidden;
}
.filmstrip-frame img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  display: block;
}

.corner-photo {
  position: absolute;
  border: 5px solid #fff;
  border-radius: 16px;
  box-shadow: 4px 4px 14px rgba(0,0,0,0.12);
  overflow: hidden;
  z-index: 3;
}
.corner-photo img {
  display: block;
  object-fit: cover;
  width: 100%;
  height: 100%;
}

.hero-bg {
  position: absolute;
  inset: 12px;
  z-index: 0;
  overflow: hidden;
  border-radius: 8px;
}
.hero-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(3px) brightness(0.4) saturate(1.2);
}

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<div class="slide-container">
  {% block header %}
  <div class="slide-header-bar">
    <h1 class="slide-title">{{ title }}</h1>
    <span class="section-tag">{{ section_tag }}</span>
  </div>
  {% endblock %}

  <div class="content">
    {% block content %}{% endblock %}
  </div>

  {% if teacher_notes %}
  <div class="teacher-note">💡 {{ teacher_notes }}</div>
  {% endif %}
</div>
</body>
</html>
